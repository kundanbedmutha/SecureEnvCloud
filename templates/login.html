<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FuzzyEnvCloud — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(124,77,255,0.2);
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo h1 {
      font-size: 1.8rem;
      color: #fff;
      letter-spacing: 1px;
    }
    .logo h1 span { color: #7c4dff; }
    .logo p {
      color: #666;
      font-size: 0.85rem;
      margin-top: 6px;
    }

    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 0.82rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #7c4dff; }

    .error-box {
      background: rgba(231,76,60,0.15);
      border: 1px solid #e74c3c;
      border-radius: 8px;
      padding: 10px 14px;
      color: #e74c3c;
      font-size: 0.88rem;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 13px;
      background: #7c4dff;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 4px;
    }
    button:hover  { background: #6a3de8; }
    button:active { transform: scale(0.98); }

    .hint {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid #2a2a4a;
    }
    .hint p {
      font-size: 0.8rem;
      color: #555;
      margin-bottom: 6px;
    }
    .hint .cred {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      padding: 6px 10px;
      background: #0f0f1a;
      border-radius: 6px;
      margin-bottom: 4px;
    }
    .hint .cred .role-badge {
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600;
    }
    .admin-badge  { background: rgba(124,77,255,0.2); color: #7c4dff; }
    .viewer-badge { background: rgba(46,204,113,0.2); color: #2ecc71; }
  </style>
</head>
<body>
  <div class="login-card">

    <div class="logo">
      <h1>Fuzzy<span>Env</span>Cloud</h1>
      <p>IoT Environmental Monitoring System</p>
    </div>

    {% if error %}
    <div class="error-box">⚠ {{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter username" required autofocus/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" required/>
      </div>
      <button type="submit">Sign In →</button>
    </form>

    <div class="hint">
      <p>Demo credentials:</p>
      <div class="cred">
        <span>admin / admin123</span>
        <span class="role-badge admin-badge">ADMIN</span>
      </div>
      <div class="cred">
        <span>viewer / viewer123</span>
        <span class="role-badge viewer-badge">VIEWER</span>
      </div>
    </div>

  </div>
</body>
</html>
